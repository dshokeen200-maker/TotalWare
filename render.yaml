# Render Blueprint — deploy TotalWare as a free web service.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: totalware
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # High timeout because a VirusTotal upload+scan can take up to ~2 minutes.
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 180 --workers 1
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates a strong random secret
      - key: VIRUSTOTAL_API_KEY
        sync: false                  # you enter these secrets in the Render dashboard
      - key: ABUSEIPDB_API_KEY
        sync: false
      - key: SHODAN_API_KEY
        sync: false
      - key: OTX_API_KEY
        sync: false
      - key: ABUSE_CH_AUTH_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
