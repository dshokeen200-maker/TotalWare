<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — TotalWare</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0:#070b16; --bg-1:#0b1120; --card:#111a2e;
    --border:rgba(255,255,255,0.08); --border-2:rgba(255,255,255,0.14);
    --txt:#e9eef9; --muted:#8794ad; --accent:#7c5cff; --accent-2:#22d3ee;
    --danger:#ff4d6a; --ok:#2ee6a6;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:'Inter',-apple-system,'Segoe UI',sans-serif;
    background:var(--bg-0); color:var(--txt); min-height:100vh;
    display:flex; align-items:center; justify-content:center; padding:1.5rem;
    -webkit-font-smoothing:antialiased;
  }
  body::before {
    content:''; position:fixed; inset:0; z-index:-2;
    background:
      radial-gradient(900px 500px at 15% -5%, rgba(124,92,255,0.18), transparent 60%),
      radial-gradient(800px 500px at 95% 0%, rgba(34,211,238,0.14), transparent 55%),
      linear-gradient(180deg, var(--bg-1), var(--bg-0));
  }
  .box { width:100%; max-width:400px; }
  .logo { display:flex; align-items:center; justify-content:center; gap:11px; margin-bottom:1.8rem; text-decoration:none; }
  .logo-icon {
    width:40px; height:40px; border-radius:11px;
    background:linear-gradient(135deg, var(--accent), var(--accent-2));
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 18px rgba(124,92,255,0.45);
  }
  .logo-text { font-size:24px; font-weight:800; letter-spacing:-0.5px; }
  .logo-text span { background:linear-gradient(135deg, var(--accent), var(--accent-2)); -webkit-background-clip:text; background-clip:text; color:transparent; }

  .card { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:2rem 1.9rem; }
  h1 { font-size:1.4rem; font-weight:700; margin-bottom:0.3rem; }
  .sub { color:var(--muted); font-size:13px; margin-bottom:1.6rem; }

  label { display:block; font-size:12px; color:var(--muted); margin-bottom:6px; margin-top:14px; font-weight:500; }
  input {
    width:100%; padding:12px 14px; border-radius:11px;
    background:rgba(255,255,255,0.04); border:1px solid var(--border-2);
    color:var(--txt); font-size:14px; font-family:inherit;
  }
  input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(124,92,255,0.12); }

  .btn {
    width:100%; margin-top:1.6rem; padding:12px; border-radius:11px; border:none;
    background:linear-gradient(135deg, var(--accent), var(--accent-2)); color:#fff;
    font-size:15px; font-weight:700; cursor:pointer; font-family:inherit;
    box-shadow:0 6px 20px rgba(124,92,255,0.32); transition:transform 0.15s;
  }
  .btn:hover { transform:translateY(-1px); }
  .btn:disabled { opacity:0.6; cursor:not-allowed; transform:none; }

  .err { display:none; margin-top:1rem; padding:10px 13px; border-radius:10px;
         background:rgba(255,77,106,0.12); border:1px solid rgba(255,77,106,0.3);
         color:#ff8a9c; font-size:13px; }
  .foot { text-align:center; margin-top:1.4rem; font-size:13px; color:var(--muted); }
  .foot a { color:var(--accent-2); text-decoration:none; font-weight:600; }
  .guest { text-align:center; margin-top:1rem; }
  .guest a { color:var(--muted); font-size:12px; text-decoration:none; }
  .guest a:hover { color:var(--txt); }
</style>
</head>
<body>
<div class="box">
  <a class="logo" href="/">
    <div class="logo-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3l7 3v5c0 4.4-3 7.6-7 9-4-1.4-7-4.6-7-9V6z"/><path d="M9 11.5l2 2 4-4"/>
      </svg>
    </div>
    <div class="logo-text">Total<span>Ware</span></div>
  </a>

  <div class="card">
    <h1>Welcome back 👋</h1>
    <p class="sub">Log in to view your scan history.</p>

    <form id="form" onsubmit="return doLogin(event)">
      <label>Username ya Email</label>
      <input type="text" id="identifier" placeholder="username / you@email.com" autocomplete="username" required>

      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>

      <div class="err" id="err"></div>
      <button class="btn" type="submit" id="btn">Login</button>
    </form>

    <div class="foot">Don't have an account? <a href="/signup">Sign up</a></div>
  </div>

  <div class="guest"><a href="/">← Scan without logging in (guest)</a></div>
</div>

<script>
async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  err.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Logging in...';
  try {
    const res = await fetch('/api/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        identifier: document.getElementById('identifier').value,
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (data.ok) { window.location.href = '/history'; return false; }
    err.textContent = data.error || 'Login fail hua'; err.style.display = 'block';
  } catch (ex) {
    err.textContent = 'Network error — is the server running?'; err.style.display = 'block';
  }
  btn.disabled = false; btn.textContent = 'Login';
  return false;
}
</script>
</body>
</html>
