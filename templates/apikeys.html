<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Keys — TotalWare</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0:#070b16; --bg-1:#0b1120; --card:#111a2e; --card-2:#0e1626;
    --border:rgba(255,255,255,0.08); --border-2:rgba(255,255,255,0.14);
    --txt:#e9eef9; --muted:#8794ad; --accent:#7c5cff; --accent-2:#22d3ee;
    --danger:#ff4d6a; --warn:#ffb020; --ok:#2ee6a6; --info:#38bdf8;
    --mono:'JetBrains Mono', ui-monospace, Menlo, monospace;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:'Inter',-apple-system,'Segoe UI',sans-serif;
    background:var(--bg-0); color:var(--txt); min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  body::before {
    content:''; position:fixed; inset:0; z-index:-2;
    background:
      radial-gradient(900px 500px at 15% -5%, rgba(124,92,255,0.18), transparent 60%),
      radial-gradient(800px 500px at 95% 0%, rgba(34,211,238,0.14), transparent 55%),
      linear-gradient(180deg, var(--bg-1), var(--bg-0));
  }
  .navbar {
    backdrop-filter:blur(14px); background:rgba(10,15,28,0.72);
    border-bottom:1px solid var(--border); padding:0 1.5rem; height:58px;
    display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:100;
  }
  .nav-logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
  .nav-logo-icon {
    width:34px; height:34px; border-radius:9px;
    background:linear-gradient(135deg, var(--accent), var(--accent-2));
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 18px rgba(124,92,255,0.45);
  }
  .nav-logo-text { font-size:19px; font-weight:800; color:var(--txt); letter-spacing:-0.5px; }
  .nav-logo-text span { background:linear-gradient(135deg, var(--accent), var(--accent-2)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .nav-tagline { font-size:12px; color:var(--muted); margin-left:4px; }
  .nav-right { margin-left:auto; display:flex; align-items:center; gap:10px; }
  .nav-badge {
    font-size:11px; padding:4px 11px; border-radius:20px;
    background:rgba(255,255,255,0.05); color:var(--muted);
    border:1px solid var(--border); text-decoration:none;
  }
  .nav-badge.active { color:var(--accent-2); border-color:rgba(34,211,238,0.4); }

  .wrap { max-width:820px; margin:0 auto; padding:2.5rem 1.5rem 4rem; }
  h1 { font-size:1.9rem; font-weight:800; letter-spacing:-1px; margin-bottom:0.4rem; }
  h1 span { background:linear-gradient(135deg, var(--accent), var(--accent-2)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub { color:var(--muted); font-size:14px; margin-bottom:2rem; }
  .sub a { color:var(--accent-2); text-decoration:none; }

  .panel { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:1.4rem 1.5rem; margin-bottom:1.4rem; }
  .panel h2 { font-size:1.05rem; font-weight:700; margin-bottom:1rem; }

  .gen-row { display:flex; gap:10px; flex-wrap:wrap; }
  .gen-row input {
    flex:1; min-width:200px; padding:11px 14px; border-radius:11px;
    background:rgba(255,255,255,0.04); border:1px solid var(--border-2);
    color:var(--txt); font-size:14px; font-family:inherit;
  }
  .gen-row input:focus { outline:none; border-color:var(--accent); }
  .btn {
    padding:11px 20px; border-radius:11px; border:none;
    background:linear-gradient(135deg, var(--accent), var(--accent-2)); color:#fff;
    font-size:14px; font-weight:700; cursor:pointer; font-family:inherit;
    box-shadow:0 6px 18px rgba(124,92,255,0.3); transition:transform 0.15s; white-space:nowrap;
  }
  .btn:hover { transform:translateY(-1px); }
  .btn:disabled { opacity:0.6; cursor:not-allowed; transform:none; }

  .newkey { margin-top:1.2rem; padding:1rem 1.1rem; border-radius:11px;
            background:rgba(46,230,166,0.08); border:1px solid rgba(46,230,166,0.3); display:none; }
  .newkey .warn { font-size:12px; color:var(--warn); margin-bottom:8px; font-weight:600; }
  .newkey .keybox { display:flex; gap:8px; align-items:center; }
  .newkey code { flex:1; font-family:var(--mono); font-size:13px; color:var(--ok);
                 background:rgba(0,0,0,0.3); padding:10px 12px; border-radius:9px; word-break:break-all; }
  .copy-btn { padding:9px 14px; border-radius:9px; border:1px solid var(--border-2);
              background:rgba(255,255,255,0.05); color:var(--txt); cursor:pointer; font-size:13px; font-family:inherit; white-space:nowrap; }
  .copy-btn:hover { background:rgba(255,255,255,0.1); }

  .key-item { display:flex; align-items:center; gap:14px; padding:13px 0; border-bottom:1px solid var(--border); }
  .key-item:last-child { border-bottom:none; }
  .key-main { flex:1; min-width:0; }
  .key-name { font-size:14px; font-weight:600; }
  .key-prefix { font-family:var(--mono); font-size:12px; color:var(--muted); margin-top:3px; }
  .key-meta { font-size:11px; color:var(--muted); text-align:right; min-width:150px; }
  .revoke-btn { background:none; border:1px solid var(--border-2); color:var(--muted);
                border-radius:9px; padding:7px 13px; cursor:pointer; font-size:12px; font-family:inherit; }
  .revoke-btn:hover { color:var(--danger); border-color:var(--danger); background:rgba(255,77,106,0.08); }

  .empty { text-align:center; padding:2.5rem 1rem; color:var(--muted); font-size:14px; }
  .empty a { color:var(--accent-2); text-decoration:none; }
</style>
</head>
<body>
<nav class="navbar">
  <a class="nav-logo" href="/">
    <div class="nav-logo-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3l7 3v5c0 4.4-3 7.6-7 9-4-1.4-7-4.6-7-9V6z"/><path d="M9 11.5l2 2 4-4"/>
      </svg>
    </div>
    <div class="nav-logo-text">Total<span>Ware</span></div>
  </a>
  <span class="nav-tagline">Universal Malware Analysis</span>
  <div class="nav-right">
    <a class="nav-badge" href="/history">🕘 History</a>
    <a class="nav-badge active" href="/account">🔑 API Keys</a>
    <a class="nav-badge" href="/">🔍 New Scan</a>
    <span id="auth-area" style="display:flex;align-items:center;gap:10px;"></span>
  </div>
</nav>

<div class="wrap">
  <h1>API <span>Keys</span></h1>
  <p class="sub">Use these keys to scan your files programmatically. Full guide: <a href="/docs">API Docs →</a></p>

  <div id="content"></div>
</div>

<script>
async function loadKeys() {
  const content = document.getElementById('content');
  const res = await fetch('/api/keys');
  if (res.status === 401) {
    content.innerHTML = '<div class="panel"><div class="empty">🔒 Log in to manage API keys.<br><br>' +
      '<a href="/login">Login</a> &nbsp;·&nbsp; <a href="/signup">Sign up</a></div></div>';
    return;
  }
  const data = await res.json();
  const keys = data.keys || [];

  content.innerHTML = `
    <div class="panel">
      <h2>Generate new key</h2>
      <div class="gen-row">
        <input type="text" id="keyname" placeholder="Key name (e.g. my-script)" maxlength="64">
        <button class="btn" id="genbtn" onclick="genKey()">+ Generate Key</button>
      </div>
      <div class="newkey" id="newkey">
        <div class="warn">⚠️ This key won't be shown again — copy it now and store it somewhere safe!</div>
        <div class="keybox">
          <code id="newkeyval"></code>
          <button class="copy-btn" onclick="copyKey()">Copy</button>
        </div>
      </div>
    </div>
    <div class="panel">
      <h2>Your keys (${keys.length})</h2>
      <div id="keylist"></div>
    </div>`;

  const list = document.getElementById('keylist');
  if (!keys.length) {
    list.innerHTML = '<div class="empty">No keys yet — generate one above.</div>';
    return;
  }
  list.innerHTML = keys.map(k => `
    <div class="key-item">
      <div class="key-main">
        <div class="key-name">${escapeHtml(k.name || 'default')}</div>
        <div class="key-prefix">${k.key_prefix}••••••••••••</div>
      </div>
      <div class="key-meta">
        Created: ${fmtDate(k.created_at)}<br>
        Last used: ${k.last_used_at ? fmtDate(k.last_used_at) : 'never'}
      </div>
      <button class="revoke-btn" onclick="revokeKey(${k.id})">Revoke</button>
    </div>`).join('');
}

function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(iso){ if(!iso) return '—'; return new Date(iso+'Z').toLocaleDateString([], {day:'2-digit',month:'short',year:'2-digit'}); }

async function genKey() {
  const btn = document.getElementById('genbtn');
  const name = document.getElementById('keyname').value.trim() || 'default';
  btn.disabled = true; btn.textContent = 'Generating...';
  const res = await fetch('/api/keys', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name })
  });
  const data = await res.json();
  if (data.key) {
    document.getElementById('newkeyval').textContent = data.key;
    document.getElementById('newkey').style.display = 'block';
    document.getElementById('keyname').value = '';
    // refresh the list (the new-key box stays on top)
    const raw = data.key;
    await loadKeys();
    document.getElementById('newkeyval').textContent = raw;
    document.getElementById('newkey').style.display = 'block';
  }
  btn.disabled = false; btn.textContent = '+ Generate Key';
}

function copyKey() {
  const val = document.getElementById('newkeyval').textContent;
  navigator.clipboard.writeText(val);
  event.target.textContent = 'Copied!';
  setTimeout(() => { event.target.textContent = 'Copy'; }, 1500);
}

async function revokeKey(id) {
  if (!confirm('Revoke this key? Any scripts using it will stop working.')) return;
  await fetch('/api/keys/' + id, { method: 'DELETE' });
  loadKeys();
}

// nav auth state
fetch('/api/me').then(r => r.json()).then(d => {
  const a = document.getElementById('auth-area');
  if (!a) return;
  if (d.user) {
    a.innerHTML = '<span class="nav-badge" style="color:var(--accent-2);">👤 ' + d.user.username + '</span>' +
                  '<a class="nav-badge" href="/logout">Logout</a>';
  } else {
    a.innerHTML = '<a class="nav-badge" href="/login">Login</a>' +
                  '<a class="nav-badge" href="/signup" style="color:var(--accent-2);">Sign up</a>';
  }
}).catch(() => {});

loadKeys();
</script>
</body>
</html>
