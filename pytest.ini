[pytest]
# Silence deprecation warnings coming from third-party libraries (oletools/pyparsing).
# These are not from TotalWare's own code — our code is warning-clean.
filterwarnings =
    ignore::DeprecationWarning:oletools
    ignore::DeprecationWarning:pyparsing
    ignore:.*enablePackrat.*
    ignore:.*setParseAction.*
    ignore:.*infixNotation.*
    ignore:.*deprecated.*:DeprecationWarning
